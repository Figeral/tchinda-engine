spring:
  application:
    name: tchinda

  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379

  # Email Configuration (Replace with real SMTP details when running)
  mail:
    host: smtp.example.com
    port: 587
    username: your_smtp_user
    password: your_smtp_password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Custom Application Config
app:
  # SerpAPI Configuration
  serpapi:
    api-key: "YOUR_SERPAPI_KEY_HERE"
    base-url: "https://serpapi.com/search.json"

  # Email Configuration
  email:
    recipient: "target@example.com"
    sender: "radar@example.com"

  # Search Queries (using ${event} as template replacement)
  queries:
    - "${event} douala cameroon"
    - "U.S venture firms application deadline"
    - "${event} fintech competition africa"

  # Keywords that get injected into the queries containing ${event}
  event-keywords:
    - fintech
    - summit
    - venture
    - hackathon

  # Location boost weights for ranking
  location-weights:
    douala: 10
    cameroon: 7
    africa: 5
    us: 5

  # Max results to fetch from SerpAPI per single query
  max-results-per-query: 10

logging:
  level:
    com.ubuntux.tchinda: DEBUG
    org.springframework.web.reactive.function.client.ExchangeFunctions: INFO
