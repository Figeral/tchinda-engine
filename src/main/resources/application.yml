spring:
  application:
    name: tchinda

  # Redis Configuration
  # data:
  #   redis:
  #     host: localhost
  #     port: 6379

  # Email Configuration (Replace with real SMTP details when running)
  mail:
    host: ${MAIL_HOST}
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Custom Application Config
app:
  # SerpAPI Configuration
  serpapi:
    api-key: ${SERPAPI_KEY}
    base-url: "https://serpapi.com/search.json"

  # Email Configuration
  email:
    recipient: ${MAIL_RECIPIENT}
    sender: ${MAIL_SENDER}

  # Search Queries (using ${event} as template replacement)
  queries:
    - "${event} events this month douala cameroon"
    - "U.S venture firms application events"
    - "${event} competition africa"

  # Keywords that get injected into the queries containing ${event}
  event-keywords:
    - fintech
    - tech summit
    - venture capital firm
    - hackathon
    - Banking

  # Location boost weights for ranking
  location-weights:
    douala: 10
    cameroon: 7
    africa: 5
    us: 5

  # Max results to fetch from SerpAPI per single query
  max-results-per-query: 10

logging:
  level:
    com.ubuntux.tchinda: DEBUG
    org.springframework.web.reactive.function.client.ExchangeFunctions: INFO
